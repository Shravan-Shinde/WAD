<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>User Registration System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
</head>

<body>

  <div class="container mt-4">

    <h2 class="text-center mb-4">User Registration System</h2>

    <button class="btn btn-success mb-3" data-toggle="modal" data-target="#addUserModal">
      Add New User
    </button>

    <!-- TABLE -->
    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Username</th>
          <th>Email</th>
          <th>Phone</th>
          <th>City</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <!-- MODAL -->
    <div class="modal fade" id="addUserModal">
      <div class="modal-dialog">
        <div class="modal-content">

          <div class="modal-header">
            <h5>Add User</h5>
            <button class="close" data-dismiss="modal">&times;</button>
          </div>

          <div class="modal-body">
            <form id="userForm">

              <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
              <input type="text" id="name" class="form-control mb-2" placeholder="Name" required>
              <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>
              <input type="text" id="city" class="form-control mb-2" placeholder="City" required>
              <input type="text" id="phone" class="form-control mb-2" placeholder="Phone" required>
              <input type="password" id="password" class="form-control mb-2" placeholder="Password" required>

              <button type="submit" class="btn btn-primary w-100">
                Submit
              </button>

            </form>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- JS -->
  <script src="main.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
