<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="d-flex">

        <!-- Sidebar -->
        <div class="sidebar p-3 text-white">
            <h3>My Dashboard</h3>
            <ul class="nav flex-column mt-4">
                <li class="nav-item"><a class="nav-link text-white" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#">Students</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#">Courses</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#">Exams</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="container-fluid p-4">

            <h2>Dashboard Overview</h2>

            <div class="row mt-4">

                <div class="col-md-3">
                    <div class="card text-white bg-primary p-3">
                        <h5>Total Students</h5>
                        <h2>1200</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card text-white bg-success p-3">
                        <h5>Courses</h5>
                        <h2>45</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card text-white bg-warning p-3">
                        <h5>Exams</h5>
                        <h2>20</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card text-white bg-danger p-3">
                        <h5>Results Published</h5>
                        <h2>15</h2>
                    </div>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
